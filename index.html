<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f0f12" />
  <title>PhotoEdit Pro — портрет</title>
  <link rel="stylesheet" href="styles.css?v=7" />
</head>
<body>
  <div class="app">
    <header class="top">
      <label class="btn btn-file" tabindex="0">
        Фото
        <input type="file" accept="image/*" id="fileInput" hidden />
      </label>
      <div class="top-actions">
        <button type="button" class="btn" id="undoBtn" disabled title="Отменить">↩</button>
        <button type="button" class="btn" id="saveBtn" disabled title="Скачать отредактированное фото (JPEG)">Скачать</button>
        <button type="button" class="btn" id="resetBtn" disabled title="Сбросить фото">Сброс</button>
      </div>
    </header>

    <main class="stage">
      <p class="hint" id="hint">Выберите фото. Четыре инструмента в один ряд — смахните вправо, чтобы открыть «Прыщи» и «Помада». «Авто кожа» может занять несколько секунд.</p>
      <p class="status" id="status" role="status" aria-live="polite"></p>
      <div class="canvas-box" id="canvasBox">
        <div class="viewport" id="viewport">
          <canvas id="view"></canvas>
        </div>
      </div>
    </main>

    <footer class="dock safe-bottom">
      <div class="auto-row" aria-label="Автоматические правки">
        <button type="button" class="btn btn-auto" id="autoSkinBtn" disabled title="После загрузки фото">Авто кожа</button>
        <button type="button" class="btn btn-auto" id="autoEyesBtn" disabled title="Нужно распознанное лицо">Авто глаза</button>
        <button type="button" class="btn btn-auto" id="autoLipsBtn" disabled title="Нужно распознанное лицо">Авто губы</button>
      </div>
      <div class="tools" role="tablist" aria-label="Инструменты">
        <button type="button" class="tool active" data-tool="smooth" aria-pressed="true">Кожа</button>
        <button type="button" class="tool" data-tool="eyes" aria-pressed="false">Глаза</button>
        <button type="button" class="tool" data-tool="heal" aria-pressed="false">Прыщи</button>
        <button type="button" class="tool" data-tool="lip" aria-pressed="false">Помада</button>
      </div>
      <div class="sliders">
        <label class="slider-label">
          <span>Сила</span>
          <input type="range" id="intensity" min="8" max="100" value="52" />
        </label>
        <label class="slider-label">
          <span>Кисть</span>
          <input type="range" id="brushSize" min="4" max="120" value="22" />
        </label>
        <label class="slider-label lip-only hidden" id="lipColorWrap">
          <span>Цвет</span>
          <input type="color" id="lipColor" value="#b8324a" />
        </label>
      </div>

      <div class="adj-panel" id="adjustPanel">
        <div class="adj-title">Коррекции (нужно лицо)</div>
        <button type="button" class="btn btn-block" id="applyAdjustBtn" disabled>Применить коррекции</button>
        <button type="button" class="btn btn-ghost btn-block" id="resetAdjustSliders">Сбросить слайдеры</button>

        <details class="adj-details" open>
          <summary>Нос</summary>
          <label class="adj-row"><span>Размер</span><input type="range" id="adj_nose_size" min="0" max="100" value="0" /></label>
          <label class="adj-row"><span>Поднять</span><input type="range" id="adj_nose_lift" min="0" max="100" value="0" /></label>
          <label class="adj-row"><span>Спинка</span><input type="range" id="adj_nose_bridge" min="0" max="100" value="0" /></label>
          <label class="adj-row"><span>Кончик</span><input type="range" id="adj_nose_tip" min="0" max="100" value="0" /></label>
        </details>
        <details class="adj-details">
          <summary>Лицо</summary>
          <label class="adj-row"><span>Размер</span><input type="range" id="adj_face_size" min="0" max="100" value="0" /></label>
          <label class="adj-row"><span>Голова</span><input type="range" id="adj_head_narrow" min="0" max="100" value="0" /></label>
          <label class="adj-row"><span>V-форма</span><input type="range" id="adj_v_shape" min="0" max="100" value="0" /></label>
          <label class="adj-row"><span>Подбородок</span><input type="range" id="adj_chin_width" min="0" max="100" value="0" /></label>
          <label class="adj-row"><span>Длина</span><input type="range" id="adj_chin_len" min="0" max="100" value="0" /></label>
          <label class="adj-row"><span>Острый</span><input type="range" id="adj_chin_point" min="0" max="100" value="0" /></label>
        </details>
        <details class="adj-details">
          <summary>Глаза</summary>
          <label class="adj-row"><span>Мешки</span><input type="range" id="adj_eye_bags" min="0" max="100" value="0" /></label>
          <label class="adj-row"><span>Ресницы</span><input type="range" id="adj_eye_lashes" min="0" max="100" value="0" /></label>
          <label class="adj-row"><span>Стрелки</span><input type="range" id="adj_eye_liner" min="0" max="100" value="0" /></label>
          <label class="adj-row"><span>Брови</span><input type="range" id="adj_eye_brows" min="0" max="100" value="0" /></label>
          <label class="adj-row"><span>Тени</span><input type="range" id="adj_eye_shadow" min="0" max="100" value="0" /></label>
        </details>
        <details class="adj-details">
          <summary>Рот</summary>
          <label class="adj-row"><span>Зубы</span><input type="range" id="adj_teeth_white" min="0" max="100" value="0" /></label>
          <label class="adj-row"><span>Улыбка</span><input type="range" id="adj_smile" min="0" max="100" value="0" /></label>
          <label class="adj-row"><span>Плампер</span><input type="range" id="adj_lip_plump" min="0" max="100" value="0" /></label>
        </details>
      </div>
    </footer>
  </div>
  <script type="module" src="app.js?v=7"></script>
</body>
</html>
